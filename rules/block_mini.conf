# ccm
^https?:\/\/ccmsupport-sz\.tenpay\.com\/ccm_page_itg_server\/qry_jobs url reject-dict
^https?:\/\/ccmsupport-sz\.tenpay\.com\/cgi-bin\/common\/ccm_page_element\.cgi url jsonjq-response-body '.banner_info={}|.ad_info_list=([.ad_info_list|fromjson[]|select(.ad_channel==134 or .ad_channel==83)]|tojson)'

# applet-ad-video/image
^https?:\/\/wxsmw\.wxs\.qq\.com\/\d+\/\d+\/(?:\w+download) url reject-200
^https?:\/\/wximg\.wxs\.qq\.com\/\d+\/\d+\/(?:\w+download) url reject-200

############ web ############

  #谷歌重定向
^https?:\/\/(www\.)?(g|google)\.cn url 302 https://www.google.com
^https?:\/\/www\.google\.com\/recaptcha\/api2\/aframe url reject-200
^https?:\/\/www\.googletagmanager\.com url reject-200
^https?:\/\/googleads\.g\.doubleclick\.net url reject-200
  #github
^https?:\/\/((raw|gist)\.)?github(usercontent)?\.com url request-header (\r\n)Accept-Language:.+(\r\n) request-header $1Accept-Language: en-US$2
  #hlw
^https?:\/\/heiliao\.com(?!\/(index(?!\/search)|static)) text/html url-and-header script-response-body https://raw.githubusercontent.com/theload9638/myScripts/main/scripts/hlw.js


